    .sort((a,b)=>a.pct-b.pct);

  const dpmoData=DPMO_OFF
    .filter(d=>{
      if(sq&&!d.login.includes(sq))return false;
      if(proc==='Todos')return true;
      if(proc==='Stow'||proc==='Stow TFI')return d.bkt==='Stow';
      return d.bkt==='Receive';
    })
    .sort((a,b)=>b.pct-a.pct);

  const uitData=UIT_OFF
    .filter(u=>(proc==='Todos'||u.proc===proc)&&(!sq||u.login.includes(sq)))
    .sort((a,b)=>b.pct-a.pct);

  const apolloData=APOLLO_COV.filter(a=>proc==='Todos'||a.proc===proc);

  const rateCounts={};
  PROCS.slice(1).forEach(p=>{rateCounts[p]=RATE_OFF.filter(r=>r.proc===p).length;});

  let html=`
  <div style="border-bottom:0.5px solid var(--color-border-tertiary);padding:1rem 0 .75rem">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:18px;font-weight:500">${META.site} · IB Metrics</div>
        <div style="font-size:13px;color:var(--color-text-secondary);margin-top:2px">Semana ${META.semana} · ${META.periodo} · ${META.aas} AAs · sem PITs/PS/PA</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${RATES.map(r=>`
        <div class="card" style="text-align:center;min-width:80px;padding:.6rem .9rem">
          <div style="font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px">${r.p}</div>
          <div style="font-size:18px;font-weight:500;color:${r.v>=100?'var(--color-text-success)':'var(--color-text-danger)'}">${r.v.toFixed(2).replace('.',',')}%</div>
        </div>`).join('')}
        ${DPMOG.map(d=>`
        <div class="card" style="text-align:center;min-width:80px;padding:.6rem .9rem;border-left:2px solid ${d.v>d.t?'var(--color-border-danger)':'var(--color-border-success)'}">
          <div style="font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px">DPMO ${d.b}</div>
          <div style="font-size:18px;font-weight:500;color:${d.v>d.t?'var(--color-text-danger)':'var(--color-text-success)'}">${fmtN(d.v)}</div>
          <div style="font-size:10px;color:var(--color-text-secondary)">lim: ${fmtN(d.t)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div style="display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 0;border-bottom:0.5px solid var(--color-border-tertiary)">
    ${PROCS.map(p=>{
      const cnt=p!=='Todos'&&tab==='rate'?rateCounts[p]:null;
      return`<button class="procBtn${proc===p?' active':''}" onclick="setState({proc:'${p}'})">${p}${cnt?` <span class="pill p-d" style="font-size:10px;padding:1px 5px">${cnt}</span>`:''}</button>`;
    }).join('')}
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap">
    <div style="display:flex">
      ${[
        {id:'rate',label:'Rate',icon:'ti-trending-up'},
        {id:'dpmo',label:'DPMO',icon:'ti-circle-dot'},
        {id:'uit',label:'UIT',icon:'ti-clock'},
        {id:'apollo',label:'Apollo',icon:'ti-shield-check'},
        {id:'prio',label:'Prioridades',icon:'ti-flag'},
      ].map(t=>`<button class="tabBtn${tab===t.id?' active':''}" onclick="setState({tab:'${t.id}'})">
        <i class="ti ${t.icon}" aria-hidden="true" style="font-size:14px;margin-right:4px"></i>${t.label}
      </button>`).join('')}
    </div>
    <input type="text" placeholder="Buscar login..." value="${search}" oninput="setState({search:this.value})" style="margin:.4rem 0">
  </div>

  <div style="padding:1rem 0">`;

  if(tab==='rate'){
    html+=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${rateData.length} ofensor(es) · ≥ 10h · meta LC individual não atingida</div>
    <div class="ovx"><table class="tbl">
    <thead><tr>
      <th>Login</th><th>Processo</th><th>Turno</th><th>Bucket LC</th><th>LC</th><th>Horas</th><th>Rate</th><th>% Meta LC</th><th>Apollo prod</th>
    </tr></thead><tbody>
    ${rateData.map(r=>`<tr>
      <td style="font-weight:500;color:var(--color-text-info)">${r.login}</td>
      <td style="color:var(--color-text-secondary)">${r.proc}</td>
      <td><span class="pill p-n">${r.turno}</span></td>
      <td><span class="pill ${r.lcB==='LC3-'?'p-i':'p-n'}">${r.lcB}</span></td>
      <td>${r.lc}</td>
      <td>${fmt1(r.h)}h</td>
      <td>${r.rate}</td>
      <td><span class="pill ${ratePill(r.pct)}" style="font-weight:500">${fmtPct(r.pct)}</span></td>
      <td><span class="pill ${r.prod===0?'p-d':'p-s'}">${r.prod===0?'0 ✕':r.prod+' ✓'}</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  if(tab==='dpmo'){
    const stowN=DPMO_OFF.filter(d=>d.bkt==='Stow').length;
    const rcvN=DPMO_OFF.filter(d=>d.bkt==='Receive').length;
    html+=`
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem">
      <div class="card" style="min-width:180px">
        <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px">Bucket Stow · threshold 10.000</div>
        <div style="font-size:24px;font-weight:500;color:var(--color-text-danger);margin:.3rem 0">${stowN} ofensores</div>
        <div style="font-size:12px;color:var(--color-text-secondary)">DPMO geral: <strong>18.676</strong> · 0 apollos de qualidade</div>
      </div>
      <div class="card" style="min-width:180px">
        <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px">Bucket Receive · threshold 7.500</div>
        <div style="font-size:24px;font-weight:500;color:var(--color-text-warning);margin:.3rem 0">${rcvN} ofensores</div>
        <div style="font-size:12px;color:var(--color-text-secondary)">DPMO geral: <strong>5.911</strong> · 0 apollos de qualidade</div>
      </div>
    </div>
    <div class="ovx"><table class="tbl">
    <thead><tr>
      <th>Login</th><th>Bucket</th><th>Turno</th><th>LC</th><th>DPMO</th><th>% threshold</th><th>Horas bucket</th><th>Apollo qual</th>
    </tr></thead><tbody>
    ${dpmoData.map(d=>`<tr>
      <td style="font-weight:500;color:var(--color-text-info)">${d.login}</td>
      <td><span class="pill p-n">${d.bkt}</span></td>
      <td><span class="pill p-n">${d.turno}</span></td>
      <td>${d.lc}</td>
      <td style="font-weight:500;color:var(--color-text-danger)">${fmtN(d.dpmo)}</td>
      <td><span class="pill ${dpmoClass(d.pct)}" style="font-weight:500">${(d.pct*100).toFixed(0)}%</span></td>
      <td>${fmt1(d.h)}h</td>
      <td><span class="pill p-d">0 ✕</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  if(tab==='uit'){
    html+=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${uitData.length} ofensor(es) · ≥ 10h · UIT acima de 10%</div>
    <div class="ovx"><table class="tbl">
    <thead><tr>
      <th>Login</th><th>Processo</th><th>Turno</th><th>LC</th><th>Horas</th><th>UIT%</th><th>Horas UIT</th><th>BMI</th>
    </tr></thead><tbody>
    ${uitData.map(u=>`<tr>
      <td style="font-weight:500;color:var(--color-text-info)">${u.login}</td>
      <td style="color:var(--color-text-secondary)">${u.proc}</td>
      <td><span class="pill p-n">${u.turno}</span></td>
      <td>${u.lc}</td>
      <td>${fmt1(u.h)}h</td>
      <td><span class="pill ${uitClass(u.pct)}" style="font-weight:500">${fmtPct(u.pct)}</span></td>
      <td>${fmt1(u.hu)}h</td>
      <td><span class="pill ${u.bmi===0?'p-d':u.bmi>=2?'p-w':'p-s'}">${u.bmi===0?'0 ✕':u.bmi}</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  if(tab==='apollo'){
    html+=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">
      Linhas com fundo marcado = turno com AAs operando e zero apollos aplicados (gap de cobertura)
    </div>
    <div class="ovx"><table class="tbl">
    <thead><tr>
      <th>Processo</th><th>Turno</th><th>AAs (≥10h)</th><th>Apollo prod</th><th>Apollo qual</th><th>BMI</th><th>Rate PPR</th><th>DPMO%</th><th>UIT médio</th>
    </tr></thead><tbody>
    ${apolloData.map(a=>{
      const gap=a.prod+a.qual+a.bmi===0;
      const rowStyle=gap?'background:var(--color-background-danger);':'';
      return`<tr style="${rowStyle}">
        <td>${a.proc}</td>
        <td><span class="pill p-n">${a.turno}</span></td>
        <td style="font-weight:500">${a.aas}</td>
        <td><span class="pill ${a.prod===0?'p-d':'p-s'}" style="min-width:28px;display:inline-block;text-align:center">${a.prod}</span></td>
        <td><span class="pill ${a.qual===0?'p-d':'p-s'}" style="min-width:28px;display:inline-block;text-align:center">${a.qual}</span></td>
        <td><span class="pill ${a.bmi===0?'p-d':'p-s'}" style="min-width:28px;display:inline-block;text-align:center">${a.bmi}</span></td>
        <td><span class="pill ${a.rPpr>=1?'p-s':a.rPpr>=.8?'p-w':'p-d'}">${(a.rPpr*100).toFixed(1).replace('.',',')}%</span></td>
        <td><span class="pill ${a.dPct>1?'p-d':'p-s'}">${(a.dPct*100).toFixed(0)}%</span></td>
        <td><span class="pill ${uitClass(a.uit)}">${fmtPct(a.uit)}</span></td>
      </tr>`;
    }).join('')}
    </tbody></table></div>`;
  }

  if(tab==='prio'){
    const actions=[
      {pri:"P1",cls:"p-d",title:"Apollo qualidade — bucket Stow (18 AAs, 0 apollos)",desc:"sdosslua 516% · nmacielr 267% · moreipri 230% · bayarmor 185%. Nenhum dos 18 ofensores teve apollo de qualidade na semana."},
      {pri:"P1",cls:"p-d",title:"Prep Recorder — zero apollos em todos os turnos",desc:"Front Night: 3 AAs LC3- com rate 34% e DPMO 110%. Back Night: DPMO 192%. Escalar para PA/supervisor com cobertura mínima exigida na S18."},
      {pri:"P2",cls:"p-w",title:"Triple ofensores sem nenhum apollo (scaranaj, antuchte, morzlian, mvargnic)",desc:"Rate + DPMO + UIT acima das metas simultaneamente, sem intervenção de qualquer tipo. Apollo prod + qual + BMI imediatos."},
      {pri:"P2",cls:"p-w",title:"BMI — 23 dos 33 ofensores de UIT sem BMI aplicado",desc:"Strong Finish é o componente dominante em Stow (7/11 casos). Changeover domina em TFI (10/17 casos). Focar BMI no componente correto por processo."},
      {pri:"P3",cls:"p-i",title:"Stow — Back Day, Back Night e Front Day com zero apollos",desc:"3 turnos com 12 AAs e nenhuma intervenção. Back Day: rate 76%, UIT 22,1%. Front Day: rate 33%, DPMO acima do threshold."},
      {pri:"P3",cls:"p-i",title:"Impacto potencial não realizado",desc:"Se ofensores de rate atingissem meta LC: +21.319 unidades (TFI: 12.321 · Stow: 4.942 · Receive: 2.367 · Prep: 1.689). Se ofensores de UIT atingissem 10%: +30,6h produtivas."},
    ];
    html+=`
    <div style="margin-bottom:1.5rem">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
        <i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:14px;margin-right:4px"></i>Triple ofensores — Rate + DPMO + UIT
      </div>
      <div class="ovx"><table class="tbl">
      <thead><tr>
        <th>Login</th><th>Turno</th><th>LC</th><th>Processo(s)</th><th>Rate %LC</th><th>DPMO</th><th>% threshold</th><th>UIT</th><th>Apollos totais</th>
      </tr></thead><tbody>
      ${TRIPLE.map(t=>`<tr style="${t.ap===0?'background:var(--color-background-danger);':''}">
        <td style="font-weight:500;color:var(--color-text-info)">${t.login}</td>
        <td><span class="pill p-n">${t.turno}</span></td>
        <td>${t.lc}</td>
        <td style="color:var(--color-text-secondary);font-size:11px">${t.proc}</td>
        <td><span class="pill p-d">${t.rate}</span></td>
        <td style="color:var(--color-text-danger);font-weight:500">${fmtN(t.dpmo)}</td>
        <td><span class="pill p-d">${t.dPct}</span></td>
        <td><span class="pill p-w">${t.uit}</span></td>
        <td><span class="pill ${t.ap===0?'p-d':t.ap<=2?'p-w':'p-s'}">${t.ap===0?'nenhum':t.ap+' parcial'}</span></td>
      </tr>`).join('')}
      </tbody></table></div>
    </div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
      <i class="ti ti-list-check" aria-hidden="true" style="font-size:14px;margin-right:4px"></i>Plano de ação — Semana 18
    </div>
    <div class="card-lg" style="display:flex;flex-direction:column;gap:0">
    ${actions.map((a,i)=>`
      <div style="display:flex;gap:12px;padding:12px 0;${i<actions.length-1?'border-bottom:0.5px solid var(--color-border-tertiary);':''}">
        <div><span class="pill ${a.cls}" style="font-size:11px;min-width:24px;display:inline-block;text-align:center">${a.pri}</span></div>
        <div>
          <div style="font-weight:500;font-size:13px;margin-bottom:3px">${a.title}</div>
          <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.5">${a.desc}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

function setState(update){state={...state,...update};render();}
render();
</script>
